name: mess_finder
description: "A location-based mobile application that helps students, employees, and bachelors find nearby mess/tiffin providers and order food."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Maps (Google Maps)
  google_maps_flutter: ^2.9.0

  # Network / Images
  cached_network_image: ^3.4.1

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3

  # UI
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
